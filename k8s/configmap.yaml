---
apiVersion: v1
kind: ConfigMap
metadata:
  name: decision-court-config
  namespace: decision-court
data:
  # Models — verify IDs against https://console.groq.com/docs before rollout.
  MODEL_DEBATE: "llama-3.3-70b-versatile"
  MODEL_VERDICT: "openai/gpt-oss-120b"
  MODEL_DEV: "llama-3.1-8b-instant"
  DEV_MODE: "false"
  # Cost guardrails
  MAX_TOKENS_PER_TURN: "900"
  MAX_TOKENS_PER_SESSION: "40000"
  MAX_JUDGE_QUESTIONS: "5"
  RATE_LIMIT_SESSIONS: "20"
  RATE_LIMIT_WINDOW_SEC: "3600"
  # Served same-origin behind the Cloudflare tunnel, so no extra CORS origin needed.
  CORS_ORIGINS: "https://decision-court.jaycurtis.org"
  CRISIS_REGION: "US"
  PUBLIC_BASE_URL: "https://decision-court.jaycurtis.org"
  GALLERY_SIZE: "24"
  COOKIE_SECURE: "true"
  MEMORY_MAX_DECISIONS: "5"
