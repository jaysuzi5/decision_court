apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: decision-court
  namespace: argocd
  # Let ArgoCD prune + self-heal like the other apps.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/jaysuzi5/decision_court.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: decision-court
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
